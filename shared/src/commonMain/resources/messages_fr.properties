poll.title=Bienvenue sur la page anniversaire de MiXiT !
poll.connected=Vous devez être connecté pour participer au sondage et tenter de gagner une place pour MiXiT 2027 !
poll.intro=Nous sommes ravis de vous accueillir sur cette page spéciale dédiée à notre quinzième anniversaire. Cinq participants seront tirés au sort pour gagner une place pour la prochaine édition en 2027.
poll.description=On vous propose de répondre à un petit sondage pour nous aider à préparer les prochaines éditions de MiXiT. Vos réponses nous permettront de mieux comprendre vos attentes et de continuer à faire de MiXiT un événement qui vous ressemble.
poll.action=Je veux participer au sondage et tenter de gagner une place pour MiXiT 2027 !
poll.keynotes= Quelles keynotes vous ont le plus marqué lors de cette édition ? Quelles keynotes aimeriez-vous voir lors des prochaines éditions ?
poll.topics=Quelles sont les remarques ou suggestions que vous avez sur les thématiques abordées lors de cette édition ? Y a-t-il des sujets que vous aimeriez voir davantage ou moins lors des prochaines éditions ?
