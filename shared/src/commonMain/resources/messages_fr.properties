faq.title=F.A.Q.
faq.intro=Retrouvez ci-dessous les réponses aux questions les plus fréquemment posées sur MiXiT.

budget.title=Transparence Budgétaire
budget.intro=Nous sommes convaincu.e.s que la confiance est la base d'une communauté forte. C'est pourquoi la transparence est au cœur de notre organisation, et cela inclut la manière dont nous gérons les fonds de la conférence.
budget.details=Vous trouverez ci dessous les grandes lignes de notre budget et la façon dont les contributions (sponsoring, billetterie) sont investies pour garantir le meilleur événement possible pour tous les participants.

budget.lines.title=Les Grandes Lignes du Budget
budget.lines.intro=Notre budget 2026 est de 130 000€ dont 55% provient de la billetterie. Il est très similaire aux années précédentes. Ce budget est réparti en plusieurs postes clés qui reflètent nos priorités
budget.lines.speakers.title=Speakers et Contenu (17%)
budget.lines.speakers.intro=Pour remercier nos speakers de leur participation bénévole nous les invitons à un dîner la veille de la conférence. Nous prenons également en charge une partie de leurs frais de déplacement et d'hébergement.
budget.lines.logistics.title=Repas et Crêpes (37%)
budget.lines.logistics.intro=Nous tenons à offrir un repas chaud de qualité à nos participants, tout en limitant nos déchets. Cela inclut les pauses-café, les déjeuners et bien sûr les fameuses crêpes de Raph ! Depuis plusieurs années nous travaillons avec le traiteur la Fine Fourchette qui propose une cuisine zéro déchet.
budget.lines.venue.title=Lieu et Logistique (19%)
budget.lines.venue.intro=Ce poste de dépense couvre la location de l'espace de la conférence. Nous remercions chaleureusement CPE Lyon de nous accueillir depuis des années d'une manière aussi bienveillante. Ce lieu fait partie intégrante de l'identité de MiXiT.
budget.lines.accessibility.title=Accessibilité (7%)
budget.lines.accessibility.intro=Nous voulons que MiXiT soit accessible au plus grand nombre. Ce poste inclut les services de vélotypie pour les malentendants, ainsi que des places réservées pour les personnes en situation de handicap.
budget.lines.media.title=Media et Communication (14%)
budget.lines.media.intro=Nous capturons les sessions en vidéo pour les rendre disponibles après l'événement. Ce poste couvre également les photos de l'événement et la communication.
budget.lines.admin.title=Structure (6%)
budget.lines.admin.intro=En tant qu'association à but non lucratif, nous avons des frais administratifs pour gérer l'organisation de l'événement tout au long de l'année (assurance, banques). Nous mettons aussi dans cette section les sommes que nous reversons aux associations dans le cadre de la Mixette.

budget.why.title=Pourquoi cette Transparence ?
budget.why.intro=Notre objectif n'est pas de réaliser des profits mais d'avoir un équilibre dans notre budget pour s'assurer que MiXiT dure encore très longtemps. En partageant la structure de nos dépenses :
budget.why.step1=Nous justifions le coût de votre billet : Vous pouvez voir concrètement où va votre investissement et comment il contribue à l'événement dans son ensemble.
budget.why.step2=Nous démontrons notre engagement : Nous tenons à vous montrer que nous gérons les fonds de manière responsable, en privilégiant l'expérience participant.
budget.questions=Si vous avez des questions sur un poste budgétaire spécifique ou si vous souhaitez en savoir plus sur notre gestion financière, n'hésitez pas à nous contacter.

login.title=Connexion
login.token=Renseignez ici le jeton de connexion que vous venez de recevoir par email. Cliquez ensuite sur le bouton Se connecter pour finaliser la connexion.
login.email=Renseignez votre email et cliquez sur le bouton Se connecter pour recevoir un jeton de connexion. Si c'est votre première connexion, vous devrez renseigner votre prénom et votre nom.
login.register=C'est votre première connexion sur notre site. Renseignez votre email, prénom et nom pour créer votre compte et recevoir un jeton de connexion par email. Une fois connecté, vous pourrez mettre vos talks en favori et noter les sessions auxquelles vous avez assisté.
login.action.token=Envoyez-moi un jeton
login.action.log=Se connecter
login.cookies=Ce site utilise des cookies uniquement pour stocker votre identité localement. En vous connectant, vous acceptez ce mode de fonctionnement.
login.data=Vos données (email, nom et prénom) sont uniquement utilisées pour vous permettre de vous connecter à notre site, de vous inscrire à notre loterie ou de générer votre badge. Nous ne les communiquons à personne et les adresses email sont chiffrées. À tout moment, vous pouvez nous demander de supprimer partiellement ou totalement vos données.
