home.section.news.title=L'édition 2026
home.section.news.when=La prochaine édition de MiXiT aura lieu les 16 et 17 avril 2026 dans les locaux de CPE (Campus Université Lyon 1) à Villeurbanne.
home.section.news.birthday=Et pour la petite histoire MiXiT fêtera ses 15 ans 🥳! Nous préparons un programme riche en surprises et en émotions et bien sûr, les fameuses crêpes de Raph seront au rendez vous.
home.section.news.birthday2=Grâce à vous, nous avons pu faire de MiXiT un événement incontournable dans le paysage tech français en gardant notre indépendance et notre ligne éditoriale. Nous sommes impatients de vous retrouver pour célébrer ce moment tous ensemble.
home.section.news.ticket=Les places seront mises en vente d'ici la fin de l'année, restez à l'affût !
home.section.news.sponsor=Rendez vous sur la page <a href="/sponsors">sponsors</a> pour découvrir nos offres de partenariat et nous aider à faire de cette édition un succès.
home.section.news.cfp=<a href="/cfp" target="cfp">L'appel à orateurs</a> ouvrira le 10 novembre 2025. Si vous souhaitez partager vos connaissances et expériences, préparez vos propositions de sessions !
home.section.news.newsletter=Inscrivez vous à notre <a href="/newsletter-subscribe" target="newsletter">newsletter</a> pour recevoir toutes les informations sur l'édition 2026 et ne rien manquer des annonces importantes.

home.section.schedule.annoucement.title=📢 Le Programme MiXiT 2026 est là !
home.section.schedule.annoucement.subtitle=L'attente est terminée. Après des semaines de délibérations intenses (et beaucoup de café), notre comité de sélection a tranché. La sélection des speakers est officiellement close et nous sommes fiers de vous dévoiler le programme complet de cette nouvelle édition.
home.section.schedule.annoucement.link=Découvrir le programme complet
home.section.sales.annoucement.title=Billetterie : On double vos chances !
home.section.sales.annoucement.link=Accéder à la billetterie
home.section.sales.annoucement.first=Round 1 : Le lundi 9 février à 13h (parfait pour la pause déjeuner).
home.section.sales.annoucement.second=Round 2 : Le lundi 23 février à 21h (pour ceux qui préfèrent le calme du soir).
home.section.sales.annoucement.subtitle=Pour que chacun puisse tenter d'obtenir sa place, peu importe son emploi du temps ou ses contraintes personnelles, nous avons décidé de scinder l'ouverture de la billetterie en deux temps forts.
home.section.sales.annoucement.description=Nous voulons une édition inclusive et accessible au plus grand nombre. Que vous soyez un lève-tôt au bureau ou plutôt du genre connecté en soirée, nous avons pensé à vous :
home.section.sales.annoucement.warning=Les places partent généralement assez vite. On vous conseille de préparer vos claviers et de mettre une alarme !


home.section.onair.title=Podcast MiXiT !
home.section.onair.subtitle=Lancé après la dernière édition en 2025, le podcast prolonge l'esprit de la conférence lyonnaise en explorant les thématiques qui font son ADN tout au long de l'année.
home.section.onair.description=Nous publions régulièrement un épisode où nous explorerons des thématiques variées et enrichissantes. Que vous soyez développeur.euse, designer.euse, product manager ou simplement curieux.euse des tendances actuelles, ce podcast est fait pour vous.
home.section.onair.joinus=Rejoignez-nous dès maintenant et ne manquez aucun épisode de ce rendez-vous riche en découvertes et en apprentissages. Suivez nous dès aujourd'hui sur les plateformes ci-dessous et restez connecté.es pour ne rien rater de l'actualité MiXiT !

home.section.values.title=Nos valeurs
home.section.values.accessibility.title=Accessibilité
home.section.values.accessibility.desc=MiXiT place l'accessibilité au coeur de ses valeurs, affirmant le droit de tou·te·s à participer pleinement à la conférence. Nous nous engageons à éliminer les barrières qui pourraient limiter la participation, que ce soit en termes de mobilité, d'audition ou d'autres besoins spécifiques. Pour cela nous avons mis en place plusieurs initiatives : vélotypie pour les malentendants, siège réservés en priorité aux personnes en situation de handicap et aux personnes enceintes, salle réservée pour les parents allaitants.
home.section.values.safe.title=Safe place
home.section.values.safe.desc=Nous avons à coeur de vous proposer un espace sécurisé lors des deux jours de MiXiT. Cet engagement se reflète non seulement dans les sessions mais également dans la manière dont l'événement est organisé : notre équipe est formée via l'AVFT (Association européenne contre les Violences faites aux Femmes au Travail) à la récolte de témoignages de harcèlement ou en cas d'agression sexuelle.
home.section.values.eco.title=Démarche écologique
home.section.values.eco.desc=Nous essayons d'avoir un bilan carbone le plus bas possible avec un traiteur zéro déchets et locavore, le recyclage des déchets restants et le recours à des fournisseurs certifiés éco-responsables chaque fois que cela est possible. Nous prenons également en compte le bilan social et environnemental de nos partenaires.


home.section.stats.title=MiXiT en quelques chiffres...

home.section.sponsors.title=Nos sponsors en
home.section.editorialline.title=Notre ligne éditoriale
home.section.editorialline.description=La particularité de MiXiT est d'être une conférence ouverte sur des sujets plus larges que nos tâches quotidiennes, où l'on essaye de réfléchir à nos responsabilités en tant que membres d'une industrie avec un fort impact sociétal mais aussi de s'ouvrir au monde avec des intervenant·e·s extérieur·e·s à nos domaines.
home.section.editorialline.themes=C'est pourquoi le programme s'articule autour de 4 thématiques qui nous sont chères : la technique, la vie des équipes, l'éthique dans nos métiers et les aliens.
home.section.editorialline.format=Les sessions quant à elles sont de plusieurs formats : des conférences de 45mn, des lightnings de 20mn et des workshops de 110mn.

